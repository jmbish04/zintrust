<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Worker Alert</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #0b1220;
      font-family:
        -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    "
  >
    <table
      role="presentation"
      style="width: 100%; border-collapse: collapse; background-color: #0b1220"
    >
      <tr>
        <td align="center" style="padding: 40px 20px">
          <table
            role="presentation"
            style="
              width: 100%;
              max-width: 600px;
              border-collapse: collapse;
              background-color: #0f172a;
              border: 1px solid #334155;
              border-radius: 12px;
              overflow: hidden;
            "
          >
            <tr>
              <td
                style="
                  padding: 40px 40px 30px;
                  text-align: center;
                  background: linear-gradient(
                    180deg,
                    rgba(239, 68, 68, 0.15),
                    rgba(220, 38, 38, 0.08)
                  );
                  border-bottom: 1px solid #334155;
                "
              >
                <div
                  style="
                    width: 48px;
                    height: 48px;
                    margin: 0 auto 20px;
                    border-radius: 12px;
                    border: 1px solid rgba(239, 68, 68, 0.35);
                    background: linear-gradient(
                      180deg,
                      rgba(239, 68, 68, 0.2),
                      rgba(220, 38, 38, 0.1)
                    );
                    display: inline-flex;
                    align-items: center;
                    justify-content: center;
                  "
                >
                  <span style="font-size: 24px">⚠️</span>
                </div>
                <h1 style="margin: 0 0 8px; font-size: 28px; font-weight: 700; color: #e2e8f0">
                  Worker Alert
                </h1>
                <p style="margin: 0; font-size: 16px; color: #94a3b8">
                  Action required for worker issue
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding: 40px">
                <p style="margin: 0 0 24px; font-size: 15px; color: #cbd5e1; line-height: 1.6">
                  Hi <strong style="color: #e2e8f0">{{name}}</strong>,
                </p>
                <table
                  role="presentation"
                  style="width: 100%; border-collapse: collapse; margin-bottom: 30px"
                >
                  <tr>
                    <td
                      style="
                        padding: 20px;
                        background: rgba(239, 68, 68, 0.1);
                        border: 1px solid rgba(239, 68, 68, 0.3);
                        border-radius: 8px;
                      "
                    >
                      <p
                        style="
                          margin: 0 0 12px;
                          font-size: 14px;
                          font-weight: 700;
                          color: #fca5a5;
                          text-transform: uppercase;
                          letter-spacing: 0.05em;
                        "
                      >
                        {{alert_level}}
                      </p>
                      <p style="margin: 0; font-size: 16px; color: #e2e8f0; line-height: 1.6">
                        {{alert_message}}
                      </p>
                    </td>
                  </tr>
                </table>
                <table
                  role="presentation"
                  style="width: 100%; border-collapse: collapse; margin-bottom: 30px"
                >
                  <tr>
                    <td
                      style="
                        padding: 20px;
                        background: rgba(15, 23, 42, 0.65);
                        border: 1px solid #334155;
                        border-radius: 8px;
                      "
                    >
                      <table style="width: 100%; border-collapse: collapse">
                        <tr>
                          <td style="padding: 8px 0; color: #94a3b8; font-size: 14px; width: 140px">
                            Worker:
                          </td>
                          <td
                            style="
                              padding: 8px 0;
                              color: #e2e8f0;
                              font-size: 14px;
                              font-weight: 500;
                            "
                          >
                            {{worker_name}}
                          </td>
                        </tr>
                        <tr>
                          <td style="padding: 8px 0; color: #94a3b8; font-size: 14px">Queue:</td>
                          <td style="padding: 8px 0; color: #e2e8f0; font-size: 14px">
                            {{queue_name}}
                          </td>
                        </tr>
                        <tr>
                          <td style="padding: 8px 0; color: #94a3b8; font-size: 14px">Job ID:</td>
                          <td
                            style="
                              padding: 8px 0;
                              color: #e2e8f0;
                              font-size: 14px;
                              font-family: 'Courier New', monospace;
                            "
                          >
                            {{job_id}}
                          </td>
                        </tr>
                        <tr>
                          <td style="padding: 8px 0; color: #94a3b8; font-size: 14px">
                            Timestamp:
                          </td>
                          <td style="padding: 8px 0; color: #e2e8f0; font-size: 14px">
                            {{timestamp}}
                          </td>
                        </tr>
                        <tr>
                          <td style="padding: 8px 0; color: #94a3b8; font-size: 14px">Error:</td>
                          <td
                            style="
                              padding: 8px 0;
                              color: #fca5a5;
                              font-size: 14px;
                              font-family: 'Courier New', monospace;
                            "
                          >
                            {{error_message}}
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                </table>
                <table role="presentation" style="width: 100%; border-collapse: collapse">
                  <tr>
                    <td align="center">
                      <a
                        href="{{dashboard_url}}"
                        style="
                          display: inline-block;
                          padding: 14px 32px;
                          background: linear-gradient(135deg, #ef4444, #dc2626);
                          color: #ffffff;
                          text-decoration: none;
                          border-radius: 8px;
                          font-weight: 600;
                          font-size: 15px;
                          border: 1px solid rgba(239, 68, 68, 0.5);
                        "
                        >View Details</a
                      >
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td
                style="
                  padding: 30px 40px;
                  background: rgba(15, 23, 42, 0.65);
                  border-top: 1px solid #334155;
                  text-align: center;
                "
              >
                <p style="margin: 0; font-size: 12px; color: #64748b">
                  &copy; {{year}} {{APP_NAME}}. All rights reserved.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
