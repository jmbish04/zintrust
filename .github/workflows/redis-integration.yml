name: Redis Integration Tests

on:
  workflow_dispatch: {}
  pull_request:
    branches: ['dev', 'master']
  push:
    branches: ['dev', 'master']

jobs:
  redis-integration:
    # Only run when a secret with a Redis connection is available
    env:
      INTEGRATION_REDIS_URL: ${{ secrets.INTEGRATION_REDIS_URL }}
    if: ${{ env.INTEGRATION_REDIS_URL != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci

      - name: Run Redis integration tests
        env:
          REDIS_URL: ${{ env.INTEGRATION_REDIS_URL }}
        run: npm test -- tests/integration/queue/Redis.integration.test.ts
