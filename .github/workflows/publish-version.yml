name: Publish to npm

on:
  workflow_run:
    workflows: ['Publish Smoke Gate']
    types:
      - completed
    branches:
      - master
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run npm publish --dry-run (no publish)'
        required: false
        default: 'true'

concurrency:
  group: publish
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'master')
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HUSKY: 0

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          # Use PAT with write access for tags/releases.
          token: ${{ secrets.RELEASE_PR_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: npm ci

      - name: Run tests, lint and type-check
        run: npm run test:coverage && npm run lint --max-warnings=0 && npm run type-check

      - name: Build distribution (core only)
        run: npm run core:build:dist

      - name: Smoke gate (fresh scaffold + cold start)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run != 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          ROOT="$PWD"
          WORKDIR="$RUNNER_TEMP/zintrust-smoke"
          rm -rf "$WORKDIR"
          mkdir -p "$WORKDIR"
          cd "$WORKDIR"

          # Scaffold a brand-new app without prompts/installs.
          node "$ROOT/dist/bin/zin.js" new smoke-app \
            --template basic \
            --database sqlite \
            --port 7777 \
            --no-interactive \
            --no-install \
            --no-git \
            --force

          cd "$WORKDIR/smoke-app"

          # Install the locally built framework package (dist/) into the fresh app.
          npm install --no-audit --no-fund "$ROOT/dist" || \
            npm install --no-audit --no-fund --legacy-peer-deps "$ROOT/dist"

          # Install the rest of the scaffolded dependencies.
          npm install --no-audit --no-fund || npm install --no-audit --no-fund --legacy-peer-deps

          export PORT=7777
          export NODE_ENV=development
          export DB_CONNECTION=sqlite
          export WORKER_ENABLED=false
          export WORKER_AUTO_START=false
          export QUEUE_DRIVER=sync

          node ./node_modules/@zintrust/core/bin/zin.js start --no-watch > server.log 2>&1 &
          PID=$!

          cleanup() {
            kill "$PID" 2>/dev/null || true
          }
          trap cleanup EXIT

          for i in {1..60}; do
            if curl -fsS "http://127.0.0.1:7777/health" >/dev/null; then
              echo "Smoke OK"
              exit 0
            fi
            sleep 0.25
          done

          echo "Smoke FAILED: /health never became ready"
          echo "---- server.log (tail) ----"
          tail -n 200 server.log || true
          exit 1

      - name: Verify version bump
        id: version_check
        run: node scripts/ci/check-version.js

      - name: Detect changed packages
        id: changed_packages
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            node scripts/ci/changed-packages.mjs --base "${{ github.event.workflow_run.head_sha }}^" || node scripts/ci/changed-packages.mjs
          else
            node scripts/ci/changed-packages.mjs --base "${{ github.event.before }}"
          fi

      - name: Detect src changes
        id: src_changes
        shell: bash
        run: |
          set -euo pipefail
          BASE="${{ steps.changed_packages.outputs.diff_base }}"
          if [ -z "${BASE}" ]; then
            echo "src_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COUNT=$(git diff --name-only "${BASE}...HEAD" -- src/ | wc -l | tr -d ' ')
          if [ "${COUNT}" -gt 0 ]; then
            echo "src_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "src_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync package versions from core
        run: |
          npm run release:sync-versions

      - name: Detect publishable packages
        id: publishable_packages
        run: node scripts/ci/publishable-packages.mjs --changed "${{ steps.changed_packages.outputs.changed_package_dirs }}"

      - name: Dry-run publish
        if: ${{ steps.version_check.outputs.should_publish == 'true' && (steps.src_changes.outputs.src_changed == 'true' || steps.version_check.outputs.is_unpublished == 'true') && github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm run pub:ci -- --dry-run

      - name: Dry-run publish packages
        if: ${{ steps.publishable_packages.outputs.packages_should_publish == 'true' && github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${{ steps.publishable_packages.outputs.publishable_package_dirs }}" ]; then
            echo "No publishable packages detected."
            exit 0
          fi

          npm run release:publish-packages -- --dry-run --continue-on-error --no-fail --only "${{ steps.publishable_packages.outputs.publishable_package_dirs }}"

      - name: Publish to npm
        if: ${{ steps.version_check.outputs.should_publish == 'true' && (steps.src_changes.outputs.src_changed == 'true' || steps.version_check.outputs.is_unpublished == 'true') && (github.event_name == 'workflow_run' || (github.event_name == 'workflow_dispatch' && inputs.dry_run != 'true')) }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm run pub:ci

      - name: Publish packages to npm
        if: ${{ steps.publishable_packages.outputs.packages_should_publish == 'true' && (github.event_name == 'workflow_run' || (github.event_name == 'workflow_dispatch' && inputs.dry_run != 'true')) }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${{ steps.publishable_packages.outputs.publishable_package_dirs }}" ]; then
            echo "No publishable packages detected."
            exit 0
          fi

          npm run release:publish-packages -- --continue-on-error --no-fail --only "${{ steps.publishable_packages.outputs.publishable_package_dirs }}"

      - name: Create tag and release (optional)
        if: ${{ steps.version_check.outputs.should_publish == 'true' && (steps.src_changes.outputs.src_changed == 'true' || steps.version_check.outputs.is_unpublished == 'true') && github.event_name == 'workflow_run' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_TOKEN }}
        run: |
          V=$(node -p "require('./dist/package.json').version")
          git config user.name 'github-actions'
          git config user.email 'actions@github.com'
          git tag v$V
          git push origin --tags

          # Create/update GitHub release (best-effort).
          gh release view v$V >/dev/null 2>&1 || gh release create v$V --title "v$V" --generate-notes
