name: Publish to npm

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run npm publish --dry-run (no publish)'
        required: false
        default: 'true'

concurrency:
  group: publish
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HUSKY: 0

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          # Use PAT with write access for tags/releases.
          token: ${{ secrets.RELEASE_PR_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: npm ci

      - name: Run tests, lint and type-check
        run: npm run test:coverage && npm run lint --max-warnings=0 && npm run type-check

      - name: Build distribution
        run: npm run pro:build

      - name: Verify version bump
        id: version_check
        run: node scripts/ci/check-version.js

      - name: Detect changed packages
        id: changed_packages
        run: node scripts/ci/changed-packages.mjs --base "${{ github.event.before }}"

      - name: Detect src changes
        id: src_changes
        shell: bash
        run: |
          set -euo pipefail
          BASE="${{ steps.changed_packages.outputs.diff_base }}"
          if [ -z "${BASE}" ]; then
            echo "src_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COUNT=$(git diff --name-only "${BASE}...HEAD" -- src/ | wc -l | tr -d ' ')
          if [ "${COUNT}" -gt 0 ]; then
            echo "src_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "src_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync package versions from core
        run: |
          npm run release:sync-versions

      - name: Detect publishable packages
        id: publishable_packages
        run: node scripts/ci/publishable-packages.mjs --changed "${{ steps.changed_packages.outputs.changed_package_dirs }}"

      - name: Dry-run publish
        if: ${{ steps.version_check.outputs.should_publish == 'true' && (steps.src_changes.outputs.src_changed == 'true' || steps.version_check.outputs.is_unpublished == 'true') && github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm run pub:ci -- --dry-run

      - name: Dry-run publish packages
        if: ${{ steps.publishable_packages.outputs.packages_should_publish == 'true' && github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "${{ steps.publishable_packages.outputs.publishable_package_dirs }}" ]; then
            npm run release:publish-packages -- --dry-run --continue-on-error --no-fail --only-unpublished --only "${{ steps.publishable_packages.outputs.publishable_package_dirs }}"
          else
            npm run release:publish-packages -- --dry-run --continue-on-error --no-fail --only-unpublished
          fi

      - name: Publish to npm
        if: ${{ steps.version_check.outputs.should_publish == 'true' && (steps.src_changes.outputs.src_changed == 'true' || steps.version_check.outputs.is_unpublished == 'true') && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry_run != 'true')) }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm run pub:ci

      - name: Publish packages to npm
        if: ${{ steps.publishable_packages.outputs.packages_should_publish == 'true' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry_run != 'true')) }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "${{ steps.publishable_packages.outputs.publishable_package_dirs }}" ]; then
            npm run release:publish-packages -- --continue-on-error --no-fail --only-unpublished --verify-core-on-npm --only "${{ steps.publishable_packages.outputs.publishable_package_dirs }}"
          else
            npm run release:publish-packages -- --continue-on-error --no-fail --only-unpublished --verify-core-on-npm
          fi

      - name: Create tag and release (optional)
        if: ${{ steps.version_check.outputs.should_publish == 'true' && (steps.src_changes.outputs.src_changed == 'true' || steps.version_check.outputs.is_unpublished == 'true') && github.event_name == 'push' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_TOKEN }}
        run: |
          V=$(node -p "require('./dist/package.json').version")
          git config user.name 'github-actions'
          git config user.email 'actions@github.com'
          git tag v$V
          git push origin --tags

          # Create/update GitHub release (best-effort).
          gh release view v$V >/dev/null 2>&1 || gh release create v$V --title "v$V" --generate-notes
