name: Publish Smoke Gate

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        template: [basic, api, microservice, fullstack]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build dist
        run: npm run -s core:build:dist

      - name: Smoke test fresh scaffold + cold start
        shell: bash
        run: |
          set -euo pipefail

          TEMPLATE="${{ matrix.template }}"
          APP_NAME="smoke-app-${TEMPLATE}"

          ROOT="$PWD"
          WORKDIR="$RUNNER_TEMP/zintrust-smoke"
          rm -rf "$WORKDIR"
          mkdir -p "$WORKDIR"
          cd "$WORKDIR"

          # Scaffold a brand-new app without prompts/installs.
          node "$ROOT/dist/bin/zin.js" new "$APP_NAME" \
            --template "$TEMPLATE" \
            --database sqlite \
            --port 7777 \
            --no-interactive \
            --no-install \
            --no-git \
            --force

          cd "$WORKDIR/$APP_NAME"

          # Install the locally built framework package (dist/) into the fresh app.
          # Avoid relative file:../../dist (it breaks because dist is under repo root, not WORKDIR).
          npm install --no-audit --no-fund "$ROOT/dist" || \
            npm install --no-audit --no-fund --legacy-peer-deps "$ROOT/dist"

          # Install the rest of the scaffolded dependencies.
          npm install --no-audit --no-fund || npm install --no-audit --no-fund --legacy-peer-deps

          echo "---- DEBUG: installed @zintrust/core resolution ----"
          node -e "const fs=require('fs');const p='node_modules/@zintrust/core';console.log('template=',process.env.SMOKE_TEMPLATE);console.log('app=',process.env.SMOKE_APP_NAME);console.log('realpath=',fs.realpathSync(p));const pkg=JSON.parse(fs.readFileSync('package.json','utf8'));console.log('smoke-app @zintrust/core dep=',pkg.dependencies?.['@zintrust/core']);"
          echo "---- DEBUG: core package.json ----"
          cat ./node_modules/@zintrust/core/package.json | sed -n '1,80p'
          echo "---- DEBUG: core proxy files ----"
          ls -la ./node_modules/@zintrust/core/src/proxy/d1/ZintrustD1Proxy.js || true
          ls -la ./node_modules/@zintrust/core/src/proxy/kv/ZintrustKvProxy.js || true
          echo "---- DEBUG: D1 proxy head ----"
          sed -n '1,80p' ./node_modules/@zintrust/core/src/proxy/d1/ZintrustD1Proxy.js || true
          echo "---- DEBUG: KV proxy head ----"
          sed -n '1,80p' ./node_modules/@zintrust/core/src/proxy/kv/ZintrustKvProxy.js || true
          echo "---- DEBUG: root index security exports ----"
          sed -n '70,130p' ./node_modules/@zintrust/core/src/index.js || true
          echo "---- DEBUG: root index optional proxy exports ----"
          if grep -n "ZintrustD1Proxy\|ZintrustKvProxy" ./node_modules/@zintrust/core/src/index.js; then
            echo "Smoke FAILED: root index should not export ZintrustD1Proxy/ZintrustKvProxy"
            exit 1
          else
            echo "OK: root index has no optional proxy exports"
          fi

          # Start server (no-watch) and verify boot via success log.
          export PORT=7777
          export NODE_ENV=development
          export DB_CONNECTION=sqlite
          export WORKER_ENABLED=false
          export DOCKER_WORKER=true
          export WORKER_SHUTDOWN_ON_APP_EXIT=false
          export DEBUG=true
          export LOG_LEVEL=debug
          export WORKER_AUTO_START=false
          export QUEUE_DRIVER=sync
          # Ensure tsx resolves paths using the scaffold app config, not any parent/core workspace tsconfig.
          export TSX_TSCONFIG_PATH="$PWD/tsconfig.json"
          echo "---- DEBUG: TSX_TSCONFIG_PATH=$TSX_TSCONFIG_PATH ----"

          (
            echo "[smoke] TSX_TSCONFIG_PATH=$TSX_TSCONFIG_PATH"
            node ./node_modules/@zintrust/core/bin/zin.js start --no-watch
          ) > server.log 2>&1 &
          PID=$!

          for i in {1..20}; do
            if grep -q "\[smoke\] TSX_TSCONFIG_PATH=" server.log; then
              echo "DEBUG OK: TSX_TSCONFIG_PATH captured in server.log"
              break
            fi
            sleep 0.1
          done

          if ! grep -q "\[smoke\] TSX_TSCONFIG_PATH=" server.log; then
            echo "Smoke FAILED: TSX_TSCONFIG_PATH not captured in server.log"
            echo "---- server.log (tail) ----"
            tail -n 100 server.log || true
            exit 1
          fi

          cleanup() {
            kill "$PID" 2>/dev/null || true
          }
          trap cleanup EXIT

          for i in {1..80}; do
            if grep -q "Application booted successfully" server.log; then
              echo "Smoke OK for template=$TEMPLATE (boot log detected)"
              exit 0
            fi

            if ! kill -0 "$PID" 2>/dev/null; then
              echo "Smoke FAILED for template=$TEMPLATE: process exited before boot success log"
              echo "---- server.log (tail) ----"
              tail -n 200 server.log || true
              exit 1
            fi

            sleep 0.25
          done

          echo "Smoke FAILED for template=$TEMPLATE: boot success log not detected in time"
          echo "---- server.log (tail) ----"
          tail -n 200 server.log || true
          exit 1
        env:
          SMOKE_TEMPLATE: ${{ matrix.template }}
          SMOKE_APP_NAME: smoke-app-${{ matrix.template }}
