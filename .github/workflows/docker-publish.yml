# Docker Image Publication
# Builds and pushes ZinTrust images to Docker Hub (primary) and GHCR.

name: Publish Docker Image

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKERHUB_REGISTRY: docker.io
  DOCKERHUB_RUNTIME_IMAGE: zintrust/zintrust
  DOCKERHUB_GATEWAY_IMAGE: zintrust/zintrust-proxy-gateway

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@68827325e0b33c7199eb31dd4e31fbe9023e06e3 # v3.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0

      - name: Lowercase repository name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Log in to the Container registry
        uses: docker/login-action@0d4c9c5ea7693da7b068278f7b52bda2a190a446 # v3.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@0d4c9c5ea7693da7b068278f7b52bda2a190a446 # v3.2.0
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for runtime image
        id: meta_runtime
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ env.DOCKERHUB_RUNTIME_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Extract metadata (tags, labels) for gateway image
        id: meta_gateway
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: |
            ${{ env.DOCKERHUB_GATEWAY_IMAGE }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-proxy-gateway
          tags: |
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build Docker image (local)
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355 # v6.10.0
        with:
          context: .
          pull: true
          load: true
          platforms: linux/amd64
          cache-from: type=gha,scope=docker-runtime
          cache-to: type=gha,mode=max,scope=docker-runtime
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test
          target: runtime

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@22438a435773de8c97dc0958cc0b823c45b064ac # master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test
          format: 'json'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          output: 'trivy-results.json'

      - name: Check Trivy results (ignore cross-spawn and glob only)
        run: |
          if [ ! -f trivy-results.json ]; then
            echo "No vulnerabilities found"
            exit 0
          fi

          # Filter vulnerabilities excluding cross-spawn and glob
          OTHER_VULNS=$(jq '[.Results[]? | select(.Vulnerabilities[]? | select(.PkgName != "cross-spawn" and .PkgName != "glob"))] | length' trivy-results.json)

          if [ "$OTHER_VULNS" -gt 0 ]; then
            echo "::error::Found vulnerabilities in packages OTHER than cross-spawn and glob"
            jq '.Results[]? | select(.Vulnerabilities[]? | select(.PkgName != "cross-spawn" and .PkgName != "glob")) | {Type, Vulnerabilities}' trivy-results.json
            exit 1
          else
            echo "✓ Only cross-spawn and glob vulnerabilities detected (allowed)"
            exit 0
          fi

      - name: Build and push runtime image
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355 # v6.10.0
        with:
          context: .
          pull: true
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=docker-runtime
          cache-to: type=gha,mode=max,scope=docker-runtime
          tags: ${{ steps.meta_runtime.outputs.tags }}
          labels: ${{ steps.meta_runtime.outputs.labels }}
          target: runtime

      - name: Build and push proxy gateway image
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355 # v6.10.0
        with:
          context: ./docker/proxy-gateway
          pull: true
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=docker-gateway
          cache-to: type=gha,mode=max,scope=docker-gateway
          tags: ${{ steps.meta_gateway.outputs.tags }}
          labels: ${{ steps.meta_gateway.outputs.labels }}
