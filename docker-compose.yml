services:
  # Web Application (Producer Only)
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '${PORT:-3000}:3000'
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      HOST: 0.0.0.0
      CSRF_SKIP_PATHS: ${CSRF_SKIP_PATHS:-/api/*,/queue-monitor/*}
      # Producer Configuration
      RUNTIME_MODE: node-server
      WORKER_ENABLED: false
      QUEUE_ENABLED: true
      # Database & Redis
      DB_CONNECTION: ${DB_CONNECTION:-postgresql}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-zintrust}
      DB_USERNAME: ${DB_USERNAME:-zintrust}
      DB_PASSWORD: ${DB_PASSWORD:-zintrust}

      # Scheduling (Node runtime only)
      SCHEDULE_SHUTDOWN_TIMEOUT_MS: ${SCHEDULE_SHUTDOWN_TIMEOUT_MS:-30000}
      SCHEDULE_OVERLAP_LOCK_TTL_MS: ${SCHEDULE_OVERLAP_LOCK_TTL_MS:-300000}

      # Schedule HTTP gateway (signed internal RPC)
      SCHEDULE_HTTP_PROXY_PATH: ${SCHEDULE_HTTP_PROXY_PATH:-/api/_sys/schedule/rpc}
      SCHEDULE_HTTP_PROXY_KEY_ID: ${SCHEDULE_HTTP_PROXY_KEY_ID:-}
      SCHEDULE_HTTP_PROXY_KEY: ${SCHEDULE_HTTP_PROXY_KEY:-}
      SCHEDULE_HTTP_PROXY_MAX_SKEW_MS: ${SCHEDULE_HTTP_PROXY_MAX_SKEW_MS:-60000}
      SCHEDULE_HTTP_PROXY_NONCE_TTL_MS: ${SCHEDULE_HTTP_PROXY_NONCE_TTL_MS:-120000}
      SCHEDULE_HTTP_PROXY_MIDDLEWARE: ${SCHEDULE_HTTP_PROXY_MIDDLEWARE:-}

      # Job tracking cleanup schedule
      JOB_TRACKING_CLEANUP_ENABLED: ${JOB_TRACKING_CLEANUP_ENABLED:-false}
      JOB_TRACKING_CLEANUP_INTERVAL_MS: ${JOB_TRACKING_CLEANUP_INTERVAL_MS:-21600000}
      JOB_TRACKING_CLEANUP_RETENTION_DAYS: ${JOB_TRACKING_CLEANUP_RETENTION_DAYS:-30}
      JOB_TRACKING_CLEANUP_BATCH_SIZE: ${JOB_TRACKING_CLEANUP_BATCH_SIZE:-5000}
      JOB_TRACKING_CLEANUP_MAX_BATCHES: ${JOB_TRACKING_CLEANUP_MAX_BATCHES:-1}
      JOB_TRACKING_CLEANUP_LOCK_PROVIDER: ${JOB_TRACKING_CLEANUP_LOCK_PROVIDER:-redis}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dist
    command: npm run dev
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "require(''node:http'').get(''http://localhost:''+(process.env.PORT||3000)+''/health'', (r)=>{ if(r.statusCode!==200) process.exit(1); r.resume(); }).on(''error'',()=>process.exit(1));"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - zintrust-network

  # Background Workers (Consumer Only)
  workers:
    build:
      context: .
      dockerfile: Dockerfile
    # No ports needed for workers usually
    environment:
      NODE_ENV: development
      CSRF_SKIP_PATHS: ${CSRF_SKIP_PATHS:-/api/*,/queue-monitor/*}
      # Consumer Configuration
      RUNTIME_MODE: containers
      WORKER_ENABLED: true
      WORKER_AUTO_START: true
      QUEUE_ENABLED: true
      # SMTP Mail
      MAIL_DRIVER: ${MAIL_DRIVER:-smtp}
      MAIL_CONNECTION: ${MAIL_CONNECTION:-smtp}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_SECURE: ${MAIL_SECURE:-false}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-ZinTrust}
      # Database & Redis
      DB_CONNECTION: ${DB_CONNECTION:-postgresql}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-zintrust}
      DB_USERNAME: ${DB_USERNAME:-zintrust}
      DB_PASSWORD: ${DB_PASSWORD:-zintrust}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dist
    # Run workers using tsx in development
    command: npx tsx bin/zin.ts worker:start-all
    networks:
      - zintrust-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-zintrust}
      POSTGRES_USER: ${DB_USERNAME:-zintrust}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-zintrust}
      CSRF_SKIP_PATHS: ${CSRF_SKIP_PATHS:-/api/*,/queue-monitor/*}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-zintrust}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zintrust-network

  # Optional: Redis for caching/sessions
  redis:
    image: redis:7-alpine
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zintrust-network
    profiles:
      - optional

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-${DB_DATABASE:-zintrust}}
      MYSQL_USER: ${MYSQL_USER:-${DB_USERNAME:-zintrust}}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-${DB_PASSWORD:-zintrust}}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - '${MYSQL_PORT:-3306}:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - zintrust-network
    profiles:
      - mysql

  app-mysql:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '${MYSQL_APP_PORT:-3001}:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      HOST: 0.0.0.0
      CSRF_SKIP_PATHS: ${CSRF_SKIP_PATHS:-/api/*,/queue-monitor/*}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-${DB_DATABASE:-zintrust}}
      DB_USERNAME: ${MYSQL_USER:-${DB_USERNAME:-zintrust}}
      DB_PASSWORD: ${MYSQL_PASSWORD:-${DB_PASSWORD:-zintrust}}

      # Scheduling (Node runtime only)
      SCHEDULE_SHUTDOWN_TIMEOUT_MS: ${SCHEDULE_SHUTDOWN_TIMEOUT_MS:-30000}
      SCHEDULE_OVERLAP_LOCK_TTL_MS: ${SCHEDULE_OVERLAP_LOCK_TTL_MS:-300000}

      # Schedule HTTP gateway (signed internal RPC)
      SCHEDULE_HTTP_PROXY_PATH: ${SCHEDULE_HTTP_PROXY_PATH:-/api/_sys/schedule/rpc}
      SCHEDULE_HTTP_PROXY_KEY_ID: ${SCHEDULE_HTTP_PROXY_KEY_ID:-}
      SCHEDULE_HTTP_PROXY_KEY: ${SCHEDULE_HTTP_PROXY_KEY:-}
      SCHEDULE_HTTP_PROXY_MAX_SKEW_MS: ${SCHEDULE_HTTP_PROXY_MAX_SKEW_MS:-60000}
      SCHEDULE_HTTP_PROXY_NONCE_TTL_MS: ${SCHEDULE_HTTP_PROXY_NONCE_TTL_MS:-120000}
      SCHEDULE_HTTP_PROXY_MIDDLEWARE: ${SCHEDULE_HTTP_PROXY_MIDDLEWARE:-}

      # Job tracking cleanup schedule
      JOB_TRACKING_CLEANUP_ENABLED: ${JOB_TRACKING_CLEANUP_ENABLED:-false}
      JOB_TRACKING_CLEANUP_INTERVAL_MS: ${JOB_TRACKING_CLEANUP_INTERVAL_MS:-21600000}
      JOB_TRACKING_CLEANUP_RETENTION_DAYS: ${JOB_TRACKING_CLEANUP_RETENTION_DAYS:-30}
      JOB_TRACKING_CLEANUP_BATCH_SIZE: ${JOB_TRACKING_CLEANUP_BATCH_SIZE:-5000}
      JOB_TRACKING_CLEANUP_MAX_BATCHES: ${JOB_TRACKING_CLEANUP_MAX_BATCHES:-1}
      JOB_TRACKING_CLEANUP_LOCK_PROVIDER: ${JOB_TRACKING_CLEANUP_LOCK_PROVIDER:-redis}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dist
    command: npm run dev
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "require(''node:http'').get(''http://localhost:''+(process.env.PORT||3000)+''/health'', (r)=>{ if(r.statusCode!==200) process.exit(1); r.resume(); }).on(''error'',()=>process.exit(1));"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - zintrust-network
    profiles:
      - mysql

  d1-proxy:
    image: node:20-alpine
    working_dir: /work
    environment:
      D1_REMOTE_SECRET: '${D1_REMOTE_SECRET:-dev-secret}'
      APP_KEY: '${APP_KEY:-dev-secret}'
      CSRF_SKIP_PATHS: ${CSRF_SKIP_PATHS:-/api/*,/queue-monitor/*}
    volumes:
      - ./packages/cloudflare-d1-proxy:/work
    command: sh -lc "npm ci --silent || npm i --silent; npx --yes wrangler@latest dev --ip 0.0.0.0 --port 7777"
    ports:
      - '${D1_PROXY_PORT:-7777}:7777'
    networks:
      - zintrust-network
    profiles:
      - d1-proxy

  kv-proxy:
    image: node:20-alpine
    working_dir: /work
    environment:
      KV_REMOTE_SECRET: '${KV_REMOTE_SECRET:-dev-secret}'
      APP_KEY: '${APP_KEY:-dev-secret}'
      CSRF_SKIP_PATHS: ${CSRF_SKIP_PATHS:-/api/*,/queue-monitor/*}
    volumes:
      - ./packages/cloudflare-kv-proxy:/work
    command: sh -lc "npm ci --silent || npm i --silent; npx --yes wrangler@latest dev --ip 0.0.0.0 --port 8788"
    ports:
      - '${KV_PROXY_PORT:-8788}:8788'
    networks:
      - zintrust-network
    profiles:
      - kv-proxy

volumes:
  postgres_data:
  redis_data:
  mysql_data:

networks:
  zintrust-network:
    driver: bridge
